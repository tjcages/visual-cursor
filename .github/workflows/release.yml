name: Release

on:
  push:
    branches: [main]

# Needed so the action can open/update the "Version Packages" PR and push tags.
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # writes an .npmrc that reads the auth token from NODE_AUTH_TOKEN —
          # required for `npm publish` to authenticate below.
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      # On every push to main: if there are unreleased changesets, open/update
      # a "Version Packages" PR that bumps the version + writes the changelog.
      # Merging that PR triggers this workflow again, and this time — with no
      # pending changesets — `publish` runs instead, publishing to npm and
      # tagging the release. Requires an NPM_TOKEN repo secret (an npm
      # automation token with publish access) — nothing publishes until
      # that's set.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
