name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @cursor/sdk (optional dep) requires Node >=22.13 — npm silently
          # skips installing it on older Node, which then fails typecheck on
          # the dynamic `import("@cursor/sdk")` in src/agent.ts.
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Build the example app (proves the package wires into a real Vite app)
        working-directory: examples/vite-react
        run: |
          npm install
          npm run build
